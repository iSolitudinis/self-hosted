services:
  rsshub:
    container_name: rsshub
    image: diygod/rsshub
    restart: unless-stopped
    networks:
      - gateway
      - rsshub_internal
    environment:
      NODE_ENV: production
      CACHE_TYPE: redis
      REDIS_URL: "redis://redis:6379/"
      PUPPETEER_WS_ENDPOINT: "ws://browserless:3000"
      PUPPETEER_REAL_BROWSER_SERVICE: "http://real-browser:3000"
      PROXY_URI: "socks5h://warp:1080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1200/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      real-browser:
        condition: service_healthy
      browserless:
        condition: service_healthy
      redis:
        condition: service_healthy

  real-browser:
    container_name: rsshub-real-browser
    image: ghcr.io/hyoban/puppeteer-real-browser-hono
    restart: unless-stopped
    networks:
      - rsshub_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  browserless:
    container_name: rsshub-browserless
    image: browserless/chrome
    restart: unless-stopped
    networks:
      - rsshub_internal
    ulimits:
      core:
        hard: 0
        soft: 0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/pressure"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    container_name: rsshub-redis
    image: redis:alpine
    restart: unless-stopped
    networks:
      - rsshub_internal
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5s

volumes:
  redis-data:
    name: rsshub-redis

networks:
  gateway:
    external: true
  rsshub_internal:
    external: true
